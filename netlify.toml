[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://graph.microsoft.com https://login.microsoftonline.com https://api.anthropic.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://graph.microsoft.com https://login.microsoftonline.com https://api.anthropic.com;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
