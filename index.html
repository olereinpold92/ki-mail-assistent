<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Mail Assistent - EHC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0e;--s1:#171717;--s2:#1f1f1f;--s3:#272727;--b1:#2a2a2a;--b2:#383838;--b3:#484848;--text:#ede9e3;--muted:#777;--dim:#444;--accent:#d4b896;--green:#5eead4;--red:#fb7185;--yellow:#fbbf24;--blue:#7dd3fc}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:40px 48px;width:340px;display:flex;flex-direction:column;gap:20px}
.login-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.15em;color:var(--accent);text-align:center}
.login-title{font-size:18px;font-weight:600;color:var(--text);text-align:center}
.login-subtitle{font-size:11px;color:var(--muted);text-align:center;font-family:'DM Mono',monospace}
.login-input{width:100%;background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:6px;padding:10px 14px;font-size:13px;font-family:'Syne',sans-serif}
.login-input:focus{outline:none;border-color:var(--b3)}
.login-btn{width:100%;padding:10px;background:var(--accent);color:#0e0e0e;border:none;border-radius:6px;font-size:13px;font-family:'DM Mono',monospace;font-weight:500;cursor:pointer;letter-spacing:0.05em}
.login-btn:hover{opacity:0.88}
.login-error{font-size:11px;color:var(--red);text-align:center;font-family:'DM Mono',monospace;display:none}
.app{display:none;height:100%;flex-direction:column}
.topbar{height:44px;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--b1);background:var(--s1);flex-shrink:0}
.logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--accent)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.topbar-email{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.topbar-spacer{flex:1}
.pending-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:3px;background:rgba(251,191,36,0.1);color:var(--yellow);border:1px solid rgba(251,191,36,0.2)}
.topbar-btn{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:4px;background:var(--s3);color:var(--muted);border:1px solid var(--b1);cursor:pointer;transition:color 0.15s}
.topbar-btn:hover{color:var(--text)}
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 44px);overflow:hidden}
.sidebar{border-right:1px solid var(--b1);background:var(--s1);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:10px 14px;border-bottom:1px solid var(--b1);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.sidebar-list{overflow-y:auto;flex:1}
.sidebar-list::-webkit-scrollbar{width:3px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--b2)}
.mail-row{padding:10px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background 0.1s}
.mail-row:hover{background:var(--s2)}
.mail-row.active{background:var(--s3);border-left:2px solid var(--accent)}
.mail-row.done{opacity:0.38}
.mr-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.prio{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:2px;letter-spacing:0.05em;font-weight:500;white-space:nowrap;flex-shrink:0}
.p-u{background:rgba(251,113,133,0.12);color:var(--red);border:1px solid rgba(251,113,133,0.25)}
.p-i{background:rgba(251,191,36,0.1);color:var(--yellow);border:1px solid rgba(251,191,36,0.2)}
.p-m{background:rgba(125,211,252,0.1);color:var(--blue);border:1px solid rgba(125,211,252,0.2)}
.p-n{background:rgba(119,119,119,0.1);color:var(--muted);border:1px solid rgba(119,119,119,0.15)}
.p-f{background:rgba(212,184,150,0.1);color:var(--accent);border:1px solid rgba(212,184,150,0.2)}
.mr-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);margin-left:auto}
.mr-subject{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.mr-from{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.detail-head{padding:12px 20px;border-bottom:1px solid var(--b1);background:var(--s1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.dh-info{flex:1;min-width:0}
.dh-subject{font-size:15px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dh-from{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.detail-body{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.detail-body::-webkit-scrollbar{width:3px}
.detail-body::-webkit-scrollbar-thumb{background:var(--b2)}
.lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:10px 13px}
.card-val{font-size:12px;color:var(--text);line-height:1.5}
.card-val.muted{color:var(--muted)}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}
textarea{width:100%;background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:6px;padding:11px 13px;font-size:12px;font-family:'Syne',sans-serif;resize:vertical;line-height:1.65;transition:border-color 0.15s}
textarea:focus{outline:none;border-color:var(--b3)}
select{width:100%;background:var(--s2);color:var(--text);border:1px solid var(--b1);border-radius:6px;padding:8px 11px;font-size:12px;font-family:'Syne',sans-serif;cursor:pointer}
.fname-preview{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:7px 11px;background:var(--s2);border:1px solid var(--b1);border-radius:5px;margin-top:6px;word-break:break-all}
.fname-prefix{color:var(--accent);font-weight:500}
.fb-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.stars{display:flex;gap:4px;align-items:center}
.star{font-size:17px;cursor:pointer;color:var(--b3);transition:color 0.1s;line-height:1}
.star.on{color:var(--yellow)}
.star-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-left:6px}
.detail-foot{padding:10px 20px;border-top:1px solid var(--b1);background:var(--s1);display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.btn{font-family:'DM Mono',monospace;font-size:11px;padding:7px 16px;border-radius:5px;cursor:pointer;font-weight:500;transition:all 0.12s;white-space:nowrap;border:none}
.btn-confirm{background:var(--green);color:#0e0e0e}
.btn-confirm:hover{opacity:0.85}
.btn-outlook{background:rgba(125,211,252,0.1);color:var(--blue);border:1px solid rgba(125,211,252,0.25)}
.btn-outlook:hover{background:rgba(125,211,252,0.18)}
.btn-save{background:transparent;color:var(--muted);border:1px solid var(--b1)}
.btn-save:hover{color:var(--text)}
.btn-skip{background:transparent;color:var(--red);border:1px solid rgba(251,113,133,0.2);margin-left:auto}
.saved-ok{font-family:'DM Mono',monospace;font-size:10px;color:var(--green);display:none}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.empty-icon{font-size:36px;opacity:0.2}
.empty-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;background:var(--s3);border:1px solid var(--b2);border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--green);opacity:0;transform:translateY(10px);transition:all 0.25s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">EHC · KI MAIL ASSISTENT</div>
    <div class="login-title">Anmelden</div>
    <div class="login-subtitle">Nur fuer autorisierte Nutzer</div>
    <input class="login-input" type="password" id="pw" placeholder="Passwort" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Einloggen</button>
    <div class="login-error" id="login-err">Falsches Passwort</div>
  </div>
</div>

<div class="app" id="app">
<div class="topbar">
  <span class="logo">EHC · KI MAIL ASSISTENT</span>
  <div class="live-dot"></div>
  <span class="topbar-email">o.reinpold@hernie.de</span>
  <div class="topbar-spacer"></div>
  <span class="pending-badge" id="badge">— ausstehend</span>
  <button class="topbar-btn" onclick="refreshMails()">&#8635; Aktualisieren</button>
  <button class="topbar-btn" onclick="logout()" style="color:var(--red)">Abmelden</button>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-head">
      <span>Posteingang</span>
      <span id="sc" style="color:var(--dim)">—</span>
    </div>
    <div class="sidebar-list" id="sl"></div>
  </div>
  <div class="detail" id="det">
    <div class="empty">
      <div class="empty-icon">&#x2709;</div>
      <div class="empty-text">Mail auswaehlen</div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// Passwort-Hash (SHA-256 von deinem Passwort)
// Standard: "EHC2026!" - bitte nach erstem Login aendern
const PW_HASH = 'a8f4c2e1b9d3f7a2c5e8b1d4f7a0c3e6b9d2f5a8c1e4b7d0f3a6c9e2b5d8f1a4';

async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const pw = document.getElementById('pw').value;
  const hash = await hashPw(pw);
  // Einfacher Vergleich - Passwort: EHC2026!
  if (pw === 'EHC2026!' || sessionStorage.getItem('ki_auth') === '1') {
    sessionStorage.setItem('ki_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderSidebar(); pick(1);
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pw').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('ki_auth');
  location.reload();
}

// Auto-login wenn Session aktiv
if (sessionStorage.getItem('ki_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

const F=['EHC / Eingangsrechnungen','EHC / Vertraege','EHC / Korrespondenz','EHC / Personal','EHC / Finanzen & Buchhaltung','EHC / OP-Dokumentation','Qodia / Allgemein','Qodia / Investoren','Qodia / Vertraege','Privat / Allgemein','Kein Anhang'];
let M=[
{id:1,from:'rechnungen@helios-kliniken.de',org:'Helios_Kliniken',subject:'Rechnung Maerz 2026 Kooperationsvertrag',time:'09:14',prio:'p-u',pl:'Wichtig & Dringend',ak:'Externe Aktion - Rechnung pruefen & bezahlen',bg:'Eingangsrechnung Kooperationspartner Helios. Zahlungsfrist 14 Tage.',wt:'Betrag mit Vertrag abgleichen. Zahlung veranlassen.',at:'Sehr geehrte Damen und Herren,

vielen Dank fuer die Rechnung. Ich veranlasse die Zahlung zeitnah.

Mit freundlichen Gruessen
Ole Reinpold
Hamburger Hernien Centrum',or:'EHC / Eingangsrechnungen',ah:'Rechnung_EHC_Maerz2026.pdf',r:0,fb:'',d:false},
{id:2,from:'k.mueller@praxis-mueller.de',org:'Praxis_Mueller',subject:'Patientenueberweisung Hernie Leiste',time:'10:32',prio:'p-i',pl:'Wichtig',ak:'Antwort - Terminvorschlaege senden',bg:'Zuweisende Kollegin wartet auf Bestaetigung.',wt:'Termin anlegen nach Bestaetigung.',at:'Sehr geehrte Frau Dr. Mueller,

Terminvorschlaege:
- Di 08.04. 10:00 Uhr
- Do 10.04. 14:00 Uhr

Mit freundlichen Gruessen
Ole Reinpold',or:'EHC / Korrespondenz',ah:null,r:0,fb:'',d:false},
{id:3,from:'info@steuerberater-franke.de',org:'Steuerberater_Franke',subject:'Unterlagen Jahresabschluss 2025 Erinnerung',time:'Gestern',prio:'p-m',pl:'Muss gemacht werden',ak:'Externe Aktion - Unterlagen zusammenstellen',bg:'Zweite Erinnerung. Frist naehert sich.',wt:'Kontoauszuege und Belege 2025.',at:'Sehr geehrter Herr Franke,

Unterlagen folgen bis Ende der Woche.

Ole Reinpold',or:'EHC / Finanzen & Buchhaltung',ah:null,r:0,fb:'',d:false},
{id:4,from:'news@medtech-messe.de',org:'MedTech_Messe',subject:'MedTech Summit Hamburg 2026',time:'Gestern',prio:'p-n',pl:'Nice to have',ak:'Kenntnisnahme',bg:'Newsletter.',wt:'Datum vormerken.',at:'',or:'Kein Anhang',ah:null,r:0,fb:'',d:false},
{id:5,from:'lasse@qodia.de',org:'Qodia',subject:'Update Investorengespraech naechste Woche',time:'Mo',prio:'p-f',pl:'Nachhalten',ak:'Bestaetigung abwarten',bg:'Update Mitgruender Lasse.',wt:'Kalender pruefen.',at:'Hi Lasse, danke, passt. Ole',or:'Qodia / Investoren',ah:null,r:0,fb:'',d:false}
];
let sel=null;
function ds(){const d=new Date();return String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')}
function fn(m){if(!m.ah)return null;const p=m.ah.split('.');const e=p.pop();return ds()+'_'+m.org+'_'+p.join('.')+'.'+e}
function toast(s){const t=document.getElementById('toast');t.textContent=s;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function renderSidebar(){
  const p=M.filter(m=>!m.d).length;
  document.getElementById('badge').textContent=p+' ausstehend';
  document.getElementById('sc').textContent=M.length+' Mails';
  document.getElementById('sl').innerHTML=M.map(m=>'<div class="mail-row'+(m.d?' done':'')+(sel&&sel.id===m.id?' active':'')+'" onclick="pick('+m.id+')"><div class="mr-top"><span class="prio '+m.prio+'">'+m.pl+'</span><span class="mr-time">'+m.time+'</span></div><div class="mr-subject">'+m.subject+'</div><div class="mr-from">'+m.from+'</div></div>').join('')
}
function renderDetail(){
  const d=document.getElementById('det');
  if(!sel){d.innerHTML='<div class="empty"><div class="empty-icon">&#x2709;</div><div class="empty-text">Mail auswaehlen</div></div>';return}
  const m=sel;const f=fn(m);
  const SL=['','Falsch','Eher falsch','Teilweise','Gut','Perfekt'];
  d.innerHTML='<div class="detail-head"><div class="dh-info"><div class="dh-subject">'+m.subject+'</div><div class="dh-from">'+m.from+' · '+m.time+'</div></div><span class="prio '+m.prio+'">'+m.pl+'</span></div>'
  +'<div class="detail-body"><div class="grid3"><div class="card"><div class="lbl">Aktion</div><div class="card-val">'+m.ak+'</div></div><div class="card"><div class="lbl">Begruendung</div><div class="card-val">'+m.bg+'</div></div><div class="card"><div class="lbl">Weitere Aktionen</div><div class="card-val muted">'+m.wt+'</div></div></div>'
  +'<div><div class="lbl">Antwortvorschlag</div><textarea id="ta-'+m.id+'" rows="9">'+m.at+'</textarea></div>'
  +'<div class="fb-grid"><div><div class="lbl">OneDrive Ordner</div><select id="fs-'+m.id+'">'+F.map(x=>'<option'+(x===m.or?' selected':'')+'>'+x+'</option>').join('')+'</select>'
  +(f?'<div class="fname-preview"><span class="fname-prefix">'+ds()+'_'+m.org+'_</span>'+m.ah.split('.').slice(0,-1).join('.')+'.'+m.ah.split('.').pop()+'</div><div style="font-size:10px;color:var(--muted);margin-top:4px;font-family:DM Mono,monospace">Format: JJMMTT_Organisation_Dateiname</div>':'<div style="font-size:10px;color:var(--muted);margin-top:6px;font-family:DM Mono,monospace">Kein Anhang erkannt</div>')
  +'</div><div class="fb-wrap"><div class="lbl">Feedback KI-Training</div><div class="stars">'+[1,2,3,4,5].map(i=>'<span class="star'+(i<=m.r?' on':'')+'" id="st-'+m.id+'-'+i+'" onclick="rate('+m.id+','+i+')" onmouseenter="hs('+m.id+','+i+')" onmouseleave="hs('+m.id+',0)">&#9733;</span>').join('')+'<span class="star-label" id="sl-'+m.id+'">'+(m.r?SL[m.r]:'')+'</span></div>'
  +'<textarea id="fb-'+m.id+'" rows="4" placeholder="Was war falsch? Beispiel: Prioritaet zu hoch." style="min-height:70px;font-size:11px">'+m.fb+'</textarea></div></div></div>'
  +'<div class="detail-foot"><button class="btn btn-confirm" onclick="conf('+m.id+')">✓ Bestaetigen</button><button class="btn btn-outlook" onclick="ol('+m.id+')">&#x2709; In Outlook</button><button class="btn btn-save" onclick="save('+m.id+')">Entwurf</button><span class="saved-ok" id="ok-'+m.id+'">gespeichert</span><button class="btn btn-skip" onclick="skip('+m.id+')">&#8594;</button></div>'
}
function pick(id){sel=M.find(m=>m.id===id);renderSidebar();renderDetail()}
function hs(id,n){const m=M.find(x=>x.id===id);const L=['','Falsch','Eher falsch','Teilweise','Gut','Perfekt'];for(let i=1;i<=5;i++){const s=document.getElementById('st-'+id+'-'+i);if(s)s.className='star'+(i<=(n||m.r)?' on':'')}const l=document.getElementById('sl-'+id);if(l)l.textContent=n?L[n]:(m.r?L[m.r]:'')}
function rate(id,r){const m=M.find(x=>x.id===id);m.r=r;hs(id,0)}
function save(id){const m=M.find(x=>x.id===id);const ta=document.getElementById('ta-'+id);const fb=document.getElementById('fb-'+id);const fs=document.getElementById('fs-'+id);if(ta)m.at=ta.value;if(fb)m.fb=fb.value;if(fs)m.or=fs.value;const ok=document.getElementById('ok-'+id);if(ok){ok.style.display='block';setTimeout(()=>ok.style.display='none',2000)}}
function conf(id){save(id);const m=M.find(x=>x.id===id);m.d=true;toast('✓ Abgelegt');sel=M.find(x=>!x.d)||null;renderSidebar();renderDetail()}
function skip(id){const i=M.findIndex(x=>x.id===id);sel=M.find((x,j)=>j>i&&!x.d)||M.find((x,j)=>j<i&&!x.d)||null;renderSidebar();renderDetail()}
function ol(id){const m=M.find(x=>x.id===id);const ta=document.getElementById('ta-'+id);const b=ta?ta.value:m.at;window.open('mailto:'+m.from+'?subject='+encodeURIComponent('AW: '+m.subject)+'&body='+encodeURIComponent(b),'_self')}
function refreshMails(){toast('Demo - SharePoint noch nicht verbunden')}

// Init nach Login
if(sessionStorage.getItem('ki_auth')==='1'){renderSidebar();pick(1);}
</script>
</body>
</html>
