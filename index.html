<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KI Mail Assistent – EHC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e0e0e0;height:100vh;overflow:hidden;user-select:none}

/* LOGIN */
#loginpage{display:flex;align-items:center;justify-content:center;height:100vh}
.login-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:40px;width:320px;text-align:center}
.login-box h2{font-size:18px;font-weight:600;margin-bottom:6px}
.login-box p{font-size:12px;color:#555;margin-bottom:24px}
.login-box input{width:100%;padding:11px 14px;background:#111;color:#e0e0e0;border:1px solid #2a2a2a;border-radius:7px;font-size:14px;margin-bottom:10px;outline:none;user-select:text}
.login-box input:focus{border-color:#444}
.login-box button{width:100%;padding:11px;background:#c9a96e;color:#111;border:none;border-radius:7px;font-size:14px;cursor:pointer;font-weight:600}
.login-box button:hover{background:#d4b896}
#err{color:#f87171;font-size:12px;margin-top:8px;display:none}
